{% extends "base.html" %}
{% block title %}Sign In — FaithGuide{% endblock %}
{% block content %}
<div class="auth-bg">
  <div class="auth-card">
    <div class="text-center mb-4">
      <i class="bi bi-brightness-high cross-icon"></i>
      <div class="brand mt-1">FaithGuide</div>
      <div style="color:#7a6a52;font-size:0.82rem;letter-spacing:1px;text-transform:uppercase">
        AI Christian Assistant
      </div>
    </div>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <div class="input-group">
          <span class="input-group-text" style="background:#1a1410;border-color:#3d3426;color:#7a6a52">
            <i class="bi bi-envelope"></i>
          </span>
          <input type="email" name="email" class="form-control"
                 placeholder="you@example.com" required autofocus/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background:#1a1410;border-color:#3d3426;color:#7a6a52">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" name="password" class="form-control"
                 placeholder="••••••••" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-gold w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </button>
    </form>

    <hr style="border-color:#3d3426;margin:24px 0"/>
    <p class="text-center mb-0" style="color:#7a6a52;font-size:0.85rem">
      New here?
      <a href="{{ url_for('auth.signup') }}"
         style="color:var(--gold);text-decoration:none;font-weight:600">
        Create an account
      </a>
    </p>

    <p class="text-center mt-3 mb-0" style="color:#4a3e2e;font-size:0.75rem;font-style:italic">
      "Your word is a lamp for my feet, a light on my path." — Psalm 119:105
    </p>
  </div>
</div>
{% endblock %}
